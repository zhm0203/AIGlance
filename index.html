<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGlance - AI新闻速览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }
        .header p {
            color: #8892b0;
            font-size: 1.1rem;
        }
        .status-badge {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 20px;
            background: rgba(102, 126, 234, 0.15);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 30px;
            font-size: 0.9rem;
            color: #667eea;
        }
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 20px;
            color: #8892b0;
        }
        .cards-grid {
            display: grid;
            gap: 25px;
        }
        .news-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 28px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .news-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .news-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(102, 126, 234, 0.3);
            box-shadow: 
                0 20px 40px -10px rgba(102, 126, 234, 0.2),
                0 0 30px -10px rgba(118, 75, 162, 0.15),
                0 10px 20px -5px rgba(240, 147, 251, 0.1);
        }
        .news-card:hover::before {
            opacity: 1;
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .author-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(102, 126, 234, 0.3);
        }
        .author-info {
            flex: 1;
        }
        .author-name {
            font-weight: 600;
            font-size: 1.05rem;
            color: #fff;
        }
        .author-username {
            color: #8892b0;
            font-size: 0.9rem;
        }
        .card-time {
            color: #6b7280;
            font-size: 0.85rem;
        }
        .ai-summary {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.08) 100%);
            border-left: 4px solid #667eea;
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .ai-summary-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .ai-summary-label::before {
            content: '✨';
        }
        .ai-summary-text {
            color: #d1d5db;
            line-height: 1.7;
            font-size: 1rem;
        }
        .original-text {
            color: #9ca3af;
            font-size: 0.95rem;
            line-height: 1.7;
            margin-top: 12px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-stats {
            display: flex;
            gap: 25px;
            margin-top: 18px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #8892b0;
            font-size: 0.9rem;
        }
        .stat-icon {
            font-size: 1.1rem;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            width: 100%;
            max-width: 700px;
            max-height: 85vh;
            overflow: hidden;
            animation: slideUp 0.3s ease;
            box-shadow: 
                0 25px 50px -12px rgba(102, 126, 234, 0.25),
                0 0 60px -15px rgba(118, 75, 162, 0.2);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: #8892b0;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .modal-close:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }
        .modal-tabs {
            display: flex;
            gap: 10px;
        }
        .tab-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #8892b0;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .tab-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .tab-btn.primary:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .modal-body {
            padding: 30px;
            overflow-y: auto;
            max-height: calc(85vh - 80px);
        }
        .modal-ai-summary {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.12) 100%);
            border: 1px solid rgba(102, 126, 234, 0.25);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 25px;
        }
        .modal-ai-summary .ai-summary-label {
            font-size: 0.85rem;
            margin-bottom: 12px;
        }
        .modal-ai-summary .ai-summary-text {
            font-size: 1.05rem;
            line-height: 1.8;
        }
        .modal-original-section {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 24px;
        }
        .section-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .modal-original-text {
            color: #d1d5db;
            font-size: 1rem;
            line-height: 1.8;
            white-space: pre-wrap;
        }
        .modal-card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .modal-author-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(102, 126, 234, 0.4);
        }
        .modal-author-info {
            flex: 1;
        }
        .modal-author-name {
            font-weight: 600;
            font-size: 1.15rem;
            color: #fff;
        }
        .modal-author-username {
            color: #8892b0;
            font-size: 0.95rem;
        }
        .modal-time {
            color: #6b7280;
            font-size: 0.9rem;
        }
        .modal-stats {
            display: flex;
            gap: 30px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }
        .modal-stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .modal-stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .modal-stat-label {
            font-size: 0.85rem;
            color: #8892b0;
        }
        .error-container {
            text-align: center;
            padding: 80px 20px;
        }
        .error-text {
            color: #f87171;
            margin-bottom: 20px;
        }
        .retry-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .retry-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AIGlance</h1>
            <p>AI新闻速览 · 智能摘要 · 一手资讯</p>
            <span class="status-badge" id="statusBadge">加载中...</span>
        </div>
        <div id="content"></div>
    </div>
    <div id="modal"></div>
    <script>
        const API_BASE = '/api';
        let state = {
            tweets: [],
            loading: true,
            error: null,
            selectedTweet: null,
            showModal: false
        };
        const aiSummaries = {
            'ai_news_001': '🔥 OpenAI本周取得重大突破！GPT-6迎来三项关键改进，模型推理能力大幅提升。Sam Altman表示进展速度令人震惊，AI发展正进入加速阶段。',
            'ai_news_002': '🤖 特斯拉Optimus机器人取得里程碑进展！目前已在14家工厂部署，学习速度超预期。Elon Musk透露年底有望实现非结构化环境完全自主。',
            'ai_news_003': '🧠 DeepMind新模型横扫47项推理基准！强化学习与大语言模型的结合展现惊人潜力，论文即将发布，值得关注。',
            'ai_news_004': '⚠️ Yann LeCun再次呼吁重视AI安全！他认为AGI发展不应只追求速度，对齐问题仍有根本挑战未解决，需要更多关注和投入。',
            'ai_news_005': '📝 Bill Gates发表年度AI公开信！强调AI是我们这个时代的决定性技术，呼吁确保其益处广泛共享，关注普惠AI发展。',
            'ai_news_006': '🚀 Google发布Gemini 2.5 Ultra！推理能力提升30%，推理速度加快50%，原生支持100万上下文窗口，本周向开发者开放。',
            'ai_news_007': '🎓 Andrew Ng推出AI智能体新课！涵盖规划、执行、迭代等核心能力，这是AI的下一个前沿领域，课程免费开放。',
            'ai_news_008': '💡 Naval分享人生智慧：最好的投资是投资自己！学习编程、学习AI，这些技能将在未来产生复利效应。'
        };
        function formatTime(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
            const diffDays = Math.floor(diffHours / 24);
            if (diffHours < 1) return '刚刚';
            if (diffHours < 24) return `${diffHours}小时前`;
            if (diffDays < 7) return `${diffDays}天前`;
            return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        }
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        function getAISummary(tweet) {
            if (aiSummaries[tweet.id]) return aiSummaries[tweet.id];
            const text = tweet.text.toLowerCase();
            if (text.includes('gpt') || text.includes('openai')) return '🤖 OpenAI相关动态，关注AI大模型最新进展。';
            if (text.includes('deepmind') || text.includes('alphafold')) return '🧬 DeepMind研究突破，AI在科学领域的应用值得关注。';
            if (text.includes('safety') || text.includes('alignment')) return '⚠️ AI安全与对齐相关讨论，技术发展与风险防控并行。';
            return '💡 精选AI资讯，涵盖技术突破、产业动态与前沿思考。';
        }
        async function fetchData() {
            state.loading = true;
            state.error = null;
            render();
            try {
                const response = await fetch(`${API_BASE}/timeline?max_results=15&hours_back=168`);
                const data = await response.json();
                state.tweets = data.data || [];
                state.loading = false;
                render();
            } catch (error) {
                console.error('Failed to fetch data:', error);
                state.error = '无法获取数据，请检查后端服务是否正常运行';
                state.loading = false;
                render();
            }
        }
        function openModal(tweet) {
            state.selectedTweet = tweet;
            state.showModal = true;
            render();
        }
        function closeModal() {
            state.showModal = false;
            state.selectedTweet = null;
            render();
        }
        function viewOnX(tweet) {
            if (tweet.author && tweet.author.xUrl) window.open(tweet.author.xUrl, '_blank');
        }
        function renderLoading() {
            return `
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <p class="loading-text">正在获取AI资讯...</p>
                </div>
            `;
        }
        function renderError() {
            return `
                <div class="error-container">
                    <p class="error-text">${state.error}</p>
                    <button class="retry-btn" onclick="fetchData()">重试</button>
                </div>
            `;
        }
        function renderCard(tweet, index) {
            const summary = getAISummary(tweet);
            return `
                <article class="news-card" onclick="openModal(state.tweets[${index}])" style="animation: fadeInUp 0.5s ease ${index * 0.1}s both;">
                    <div class="card-header">
                        <img class="author-avatar" src="${tweet.author.avatar}" alt="${tweet.author.name}">
                        <div class="author-info">
                            <div class="author-name">${tweet.author.name}</div>
                            <div class="author-username">@${tweet.author.username}</div>
                        </div>
                        <div class="card-time">${formatTime(tweet.time)}</div>
                    </div>
                    <div class="ai-summary">
                        <div class="ai-summary-label">AI智能摘要</div>
                        <div class="ai-summary-text">${summary}</div>
                    </div>
                    <div class="original-text">${tweet.text}</div>
                    <div class="card-stats">
                        <div class="stat-item">
                            <span class="stat-icon">❤️</span>
                            <span>${formatNumber(tweet.likes)}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-icon">🔄</span>
                            <span>${formatNumber(tweet.retweets)}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-icon">💬</span>
                            <span>${formatNumber(tweet.replies)}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-icon">👁️</span>
                            <span>${tweet.views}</span>
                        </div>
                    </div>
                </article>
            `;
        }
        function renderCards() {
            return `
                <div class="cards-grid">
                    ${state.tweets.map((tweet, index) => renderCard(tweet, index)).join('')}
                </div>
            `;
        }
        function renderModal() {
            if (!state.showModal || !state.selectedTweet) return '';
            const tweet = state.selectedTweet;
            const summary = getAISummary(tweet);
            return `
                <div class="modal-overlay" onclick="closeModal()">
                    <div class="modal-content" onclick="event.stopPropagation()">
                        <div class="modal-header">
                            <div></div>
                            <div class="modal-tabs">
                                <button class="tab-btn primary" onclick="viewOnX(state.selectedTweet)">查看原文 ↗</button>
                            </div>
                            <button class="modal-close" onclick="closeModal()">×</button>
                        </div>
                        <div class="modal-body">
                            <div class="modal-card-header">
                                <img class="modal-author-avatar" src="${tweet.author.avatar}" alt="${tweet.author.name}">
                                <div class="modal-author-info">
                                    <div class="modal-author-name">${tweet.author.name}</div>
                                    <div class="modal-author-username">@${tweet.author.username}</div>
                                </div>
                                <div class="modal-time">${formatTime(tweet.time)}</div>
                            </div>
                            <div class="modal-ai-summary">
                                <div class="ai-summary-label">✨ AI智能摘要</div>
                                <div class="ai-summary-text">${summary}</div>
                            </div>
                            <div class="modal-original-section">
                                <div class="section-label">原文内容</div>
                                <div class="modal-original-text">${tweet.text}</div>
                            </div>
                            <div class="modal-stats">
                                <div class="modal-stat-item">
                                    <span class="modal-stat-value">${formatNumber(tweet.likes)}</span>
                                    <span class="modal-stat-label">点赞</span>
                                </div>
                                <div class="modal-stat-item">
                                    <span class="modal-stat-value">${formatNumber(tweet.retweets)}</span>
                                    <span class="modal-stat-label">转发</span>
                                </div>
                                <div class="modal-stat-item">
                                    <span class="modal-stat-value">${formatNumber(tweet.replies)}</span>
                                    <span class="modal-stat-label">回复</span>
                                </div>
                                <div class="modal-stat-item">
                                    <span class="modal-stat-value">${tweet.views}</span>
                                    <span class="modal-stat-label">浏览</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        function render() {
            const content = document.getElementById('content');
            const modal = document.getElementById('modal');
            const statusBadge = document.getElementById('statusBadge');
            if (state.loading) statusBadge.textContent = '加载中...';
            else if (state.error) {
                statusBadge.textContent = '加载失败';
                statusBadge.style.background = 'rgba(248, 113, 113, 0.15)';
                statusBadge.style.borderColor = 'rgba(248, 113, 113, 0.3)';
                statusBadge.style.color = '#f87171';
            } else {
                statusBadge.textContent = '实时更新 · 免费数据';
                statusBadge.style.background = 'rgba(16, 185, 129, 0.15)';
                statusBadge.style.borderColor = 'rgba(16, 185, 129, 0.3)';
                statusBadge.style.color = '#10b981';
            }
            if (state.loading) content.innerHTML = renderLoading();
            else if (state.error) content.innerHTML = renderError();
            else content.innerHTML = renderCards();
            modal.innerHTML = renderModal();
        }
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.viewOnX = viewOnX;
        window.fetchData = fetchData;
        fetchData();
    </script>
</body>
</html>
